<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>نظام القضايا | المحامي سعود العتيبي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0a0e17; --ink2:#111827; --ink3:#1a2233;
  --card:#1c2540; --card2:#222d48;
  --rim:rgba(255,255,255,0.07); --rim2:rgba(255,255,255,0.12);
  --gold:#c9a84c; --gold2:#e8c870;
  --gold-dim:rgba(201,168,76,0.15); --gold-rim:rgba(201,168,76,0.3);
  --text:#eef2ff; --text2:#94a3c0; --text3:#5a6a88;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,20px);
}
body.day {
  --ink:#f0f4ff; --ink2:#e2e8f8; --ink3:#d8dfee;
  --card:#ffffff; --card2:#f5f8ff;
  --rim:rgba(0,0,0,0.07); --rim2:rgba(0,0,0,0.12);
  --text:#0a0e17; --text2:#334155; --text3:#64748b;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--ink); overflow:hidden; font-family:'IBM Plex Sans Arabic',sans-serif; color:var(--text); direction:rtl; transition:all .3s; }

#app { display:flex; flex-direction:column; height:100vh; height:100dvh; max-width:430px; margin:0 auto; background:var(--ink); position:relative; }
#hdr { flex-shrink:0; padding-top:var(--safe-top); background:var(--ink); z-index:40; border-bottom:1px solid var(--rim); }
.hi { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; }
.ht { font-family:'Amiri',serif; font-size:22px; font-weight:700; color:var(--gold2); }
.ha { display:flex; gap:8px; }

.bn-add { background:var(--gold); color:var(--ink); border-radius:12px; padding:10px 16px; font-size:13px; font-weight:700; cursor:pointer; box-shadow:0 4px 15px rgba(201,168,76,0.3); border:none; display:flex; align-items:center; gap:5px; }
.bi { width:36px; height:36px; border-radius:12px; background:var(--card); border:1px solid var(--rim2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; }

/* Navigation Tabs */
.ts { display:flex; padding:8px 12px; gap:6px; overflow-x:auto; background:var(--ink); scrollbar-width: none; }
.ts::-webkit-scrollbar { display:none; }
.tp { flex-shrink:0; padding:8px 16px; border-radius:12px; color:var(--text3); font-size:12px; font-weight:600; cursor:pointer; border:1px solid transparent; transition:0.2s; }
.tp.on { background:var(--gold-dim); color:var(--gold2); border-color:var(--gold-rim); }

#cnt { flex:1; overflow-y:auto; padding:16px; -webkit-overflow-scrolling:touch; }

/* Case Card */
.case-card { background:var(--card); border:1px solid var(--rim); border-radius:18px; padding:16px; margin-bottom:12px; position:relative; overflow:hidden; transition:0.2s; }
.case-card:active { transform: scale(0.98); }
.case-card::before { content:''; position:absolute; right:0; top:0; height:100%; width:4px; background:var(--gold); }
.case-hdr { display:flex; justify-content:space-between; margin-bottom:10px; }
.case-num { font-family:'Amiri',serif; font-size:18px; font-weight:700; color:var(--gold2); }
.case-court { font-size:11px; color:var(--text3); margin-top:2px; display:flex; align-items:center; gap:4px; }
.case-date { text-align:left; }
.case-time { font-size:15px; font-weight:700; color:var(--text); }
.case-day { font-size:10px; color:var(--text3); }
.case-status { display:inline-flex; padding:4px 10px; border-radius:8px; font-size:10px; font-weight:700; margin-top:10px; background:var(--gold-dim); color:var(--gold2); border:1px solid var(--gold-rim); }

/* Modal Sheet */
.ov { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; justify-content:flex-end; }
.ov.hid { display:none; }
.ob { position:absolute; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); }
.sheet { position:relative; background:var(--card); border-radius:24px 24px 0 0; padding:24px; max-height:85vh; overflow-y:auto; border-top:1px solid var(--rim2); }
.sheet-h { width:40px; height:4px; background:var(--rim2); border-radius:2px; margin:-10px auto 20px; }

/* Forms */
.field { margin-bottom:16px; }
.field label { display:block; font-size:12px; color:var(--text3); margin-bottom:6px; font-weight:600; }
.field input, .field select, .field textarea { width:100%; background:var(--ink3); border:1px solid var(--rim2); border-radius:12px; padding:14px; color:var(--text); font-family:inherit; font-size:14px; }
.field input:focus { border-color:var(--gold); outline:none; }

.bg-btn { width:100%; background:var(--gold); color:var(--ink); border-radius:14px; padding:16px; font-weight:700; font-size:15px; cursor:pointer; border:none; margin-top:10px; }

/* Empty State */
.empty { text-align:center; padding:60px 20px; color:var(--text3); }
.empty-icon { font-size:50px; margin-bottom:15px; opacity:0.3; }

</style>
</head>
<body>

<div id="app">
  <div id="hdr">
    <div class="hi">
      <div class="ht">المحامي سعود ⚖️</div>
      <div class="ha">
        <button class="bi" onclick="toggleTheme()">🌓</button>
        <button class="bn-add" onclick="openAddCase()"><span>+</span> قضية جديدة</button>
      </div>
    </div>
    <div class="ts">
      <button class="tp on" id="t-home" onclick="tab('home')">الرئيسية</button>
      <button class="tp" id="t-cases" onclick="tab('cases')">سجل القضايا</button>
      <button class="tp" id="t-tasks" onclick="tab('tasks')">المهمات</button>
      <button class="tp" id="t-stats" onclick="tab('stats')">التقارير</button>
    </div>
  </div>

  <div id="cnt">
    </div>
</div>

<div class="ov hid" id="modal">
  <div class="ob" onclick="closeModal()"></div>
  <div class="sheet">
    <div class="sheet-h"></div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// --- إدارة البيانات ---
let db = {
  cases: JSON.parse(localStorage.getItem('saud_cases') || '[]'),
  tasks: JSON.parse(localStorage.getItem('saud_tasks') || '[]')
};

let currentTab = 'home';

function saveDB() {
  localStorage.setItem('saud_cases', JSON.stringify(db.cases));
  localStorage.setItem('saud_tasks', JSON.stringify(db.tasks));
}

// --- التنقل ---
function tab(name) {
  currentTab = name;
  document.querySelectorAll('.tp').forEach(t => t.classList.toggle('on', t.id === 't-'+name));
  render();
}

function render() {
  const cnt = document.getElementById('cnt');
  if (currentTab === 'home') renderHome(cnt);
  if (currentTab === 'cases') renderCases(cnt);
  if (currentTab === 'tasks') renderTasks(cnt);
  if (currentTab === 'stats') renderStats(cnt);
}

// --- واجهة الرئيسية ---
function renderHome(cnt) {
  const today = new Date().toISOString().split('T')[0];
  const upcoming = db.cases.filter(c => c.date >= today).sort((a,b) => a.date.localeCompare(b.date));
  
  let html = `<div style="margin-bottom:20px"><h2 style="font-size:16px; color:var(--text2)">جلسات قريبة 📅</h2></div>`;
  
  if (upcoming.length === 0) {
    html += `<div class="empty"><div class="empty-icon">📂</div><div>لا توجد جلسات قادمة حالياً</div></div>`;
  } else {
    upcoming.forEach((c, idx) => html += caseCard(c, idx));
  }
  cnt.innerHTML = html;
}

// --- واجهة القضايا ---
function renderCases(cnt) {
  let html = `<div style="margin-bottom:20px"><h2 style="font-size:16px; color:var(--text2)">كافة القضايا ⚖️</h2></div>`;
  if (db.cases.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🔎</div><div>السجل فارغ، أضف أول قضية الآن</div></div>`;
  } else {
    db.cases.forEach((c, idx) => html += caseCard(c, idx));
  }
  cnt.innerHTML = html;
}

function caseCard(c, idx) {
  return `
    <div class="case-card">
      <div class="case-hdr">
        <div>
          <div class="case-num">${c.num}</div>
          <div class="case-court">🏛️ ${c.court}</div>
        </div>
        <div class="case-date">
          <div class="case-time">${c.time}</div>
          <div class="case-day">${c.date}</div>
        </div>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div class="case-status">جلسة مجدولة</div>
        <button onclick="deleteCase(${idx})" style="background:none; border:none; color:var(--text3); font-size:11px; cursor:pointer">حذف القضية</button>
      </div>
    </div>
  `;
}

// --- إضافة قضية جديدة ---
function openAddCase() {
  const modalCnt = document.getElementById('modal-content');
  modalCnt.innerHTML = `
    <h2 style="font-family:'Amiri',serif; color:var(--gold2); margin-bottom:20px">إضافة قضية / جلسة جديدة</h2>
    <div class="field"><label>رقم القضية</label><input type="text" id="in-num" placeholder="مثال: 440012345"></div>
    <div class="field"><label>اسم المحكمة / الدائرة</label><input type="text" id="in-court" placeholder="المحكمة العامة بالرياض"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div class="field"><label>التاريخ</label><input type="date" id="in-date"></div>
      <div class="field"><label>الوقت</label><input type="time" id="in-time"></div>
    </div>
    <div class="field"><label>ملاحظات إضافية</label><textarea id="in-note" rows="2"></textarea></div>
    <button class="bg-btn" onclick="saveNewCase()">حفظ القضية في السجل</button>
  `;
  document.getElementById('modal').classList.remove('hid');
}

function saveNewCase() {
  const num = document.getElementById('in-num').value;
  const court = document.getElementById('in-court').value;
  const date = document.getElementById('in-date').value;
  const time = document.getElementById('in-time').value;

  if (!num || !court || !date) {
    alert("يرجى إكمال البيانات الأساسية");
    return;
  }

  db.cases.push({ num, court, date, time, status: 'active' });
  saveDB();
  closeModal();
  tab('cases');
}

// --- التقارير ---
function renderStats(cnt) {
  const total = db.cases.length;
  const upcoming = db.cases.filter(c => c.date >= new Date().toISOString().split('T')[0]).length;
  
  cnt.innerHTML = `
    <h2 style="font-size:16px; color:var(--text2); margin-bottom:20px">تقرير المكتب 📊</h2>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
      <div style="background:var(--card); padding:20px; border-radius:18px; text-align:center; border:1px solid var(--rim)">
        <div style="font-size:28px; font-weight:700; color:var(--gold2)">${total}</div>
        <div style="font-size:11px; color:var(--text3)">إجمالي القضايا</div>
      </div>
      <div style="background:var(--card); padding:20px; border-radius:18px; text-align:center; border:1px solid var(--rim)">
        <div style="font-size:28px; font-weight:700; color:var(--gold2)">${upcoming}</div>
        <div style="font-size:11px; color:var(--text3)">جلسات قادمة</div>
      </div>
    </div>
  `;
}

// --- وظائف عامة ---
function closeModal() { document.getElementById('modal').classList.add('hid'); }
function deleteCase(idx) { if(confirm('هل أنت متأكد من حذف هذه القضية؟')) { db.cases.splice(idx,1); saveDB(); render(); } }
function toggleTheme() { document.body.classList.toggle('day'); }

// --- التشغيل الأول ---
window.onload = render;
</script>
</body>
</html>
