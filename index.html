<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>منظومة المحامي سعود الذكية | AI Enabled</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0a0e17; --ink2:#111827; --ink3:#1a2233;
  --card:#1c2540; --card2:#222d48;
  --rim:rgba(255,255,255,0.07); --rim2:rgba(255,255,255,0.12);
  --gold:#c9a84c; --gold2:#e8c870;
  --gold-dim:rgba(201,168,76,0.15); --gold-rim:rgba(201,168,76,0.3);
  --text:#eef2ff; --text2:#94a3c0; --text3:#5a6a88;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,20px);
}
body.day {
  --ink:#f0f4ff; --ink2:#e2e8f8; --ink3:#d8dfee;
  --card:#ffffff; --card2:#f5f8ff;
  --rim:rgba(0,0,0,0.07); --rim2:rgba(0,0,0,0.12);
  --text:#0a0e17; --text2:#334155; --text3:#64748b;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--ink); overflow:hidden; font-family:'IBM Plex Sans Arabic',sans-serif; color:var(--text); direction:rtl; transition:all .3s; }

#app { display:flex; flex-direction:column; height:100vh; height:100dvh; max-width:430px; margin:0 auto; background:var(--ink); }
#hdr { flex-shrink:0; padding-top:var(--safe-top); background:var(--ink); z-index:40; border-bottom:1px solid var(--rim); }
.hi { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; }
.ht { font-family:'Amiri',serif; font-size:21px; font-weight:700; color:var(--gold2); }
.ha { display:flex; gap:6px; }
.bi { width:34px; height:34px; border-radius:10px; background:var(--card); border:1px solid var(--rim2); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; }

.ts { display:flex; padding:8px; gap:4px; overflow-x:auto; background:var(--ink); border-bottom:1px solid var(--rim); }
.ts::-webkit-scrollbar { display:none; }
.tp { flex-shrink:0; padding:8px 14px; border-radius:10px; color:var(--text3); font-size:11px; font-weight:600; cursor:pointer; border:1px solid transparent; white-space:nowrap; transition:0.2s; }
.tp.on { background:var(--gold-dim); color:var(--gold2); border-color:var(--gold-rim); }

#cnt { flex:1; overflow-y:auto; padding:15px; position:relative; }

/* AI Chat UI */
.chat-container { display:flex; flex-direction:column; height:100%; }
.chat-msgs { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:12px; }
.msg { max-width:85%; padding:12px; border-radius:15px; font-size:13px; line-height:1.6; }
.msg.ai { align-self:flex-start; background:var(--card2); border:1px solid var(--gold-rim); border-top-right-radius:2px; }
.msg.user { align-self:flex-end; background:var(--gold); color:var(--ink); border-top-left-radius:2px; font-weight:500; }
.chat-input-area { padding:10px; background:var(--ink2); border-top:1px solid var(--rim); display:flex; gap:8px; }
.chat-input { flex:1; background:var(--ink3); border:1px solid var(--rim2); border-radius:20px; padding:10px 15px; color:var(--text); font-size:13px; outline:none; }
.send-btn { width:40px; height:40px; border-radius:50%; background:var(--gold); border:none; cursor:pointer; font-weight:bold; }
.loading { font-size:10px; color:var(--gold2); margin-top:5px; }
</style>
</head>
<body>

<div id="app">
  <div id="hdr">
    <div class="hi"><div class="ht">مساعد المحامي سعود ⚖️</div></div>
    <div class="ts">
      <button class="tp on" id="t-home" onclick="go('home')">الرئيسية</button>
      <button class="tp" id="t-ai" onclick="go('ai')">🤖 المستشار AI</button>
      <button class="tp" id="t-list" onclick="go('list')">الجلسات</button>
      <button class="tp" id="t-tools" onclick="go('tools')">الأدوات</button>
    </div>
  </div>
  <div id="cnt"></div>
</div>

<script>
const API_KEY = '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';

let state = {
  sessions: JSON.parse(localStorage.getItem('saud_s') || '[]'),
  chatHistory: [{role:'assistant', content: 'مرحباً أستاذ سعود، معك المستشار القانوني الذكي. كيف يمكنني مساعدتك اليوم في تفاصيل قضيتك أو في استنباط مادة قانونية؟'}],
  currentTab: 'home',
  isTyping: false
};

function go(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tp').forEach(btn => btn.classList.toggle('on', btn.id === 't-'+tab));
  render();
}

function render() {
  const cnt = document.getElementById('cnt');
  cnt.innerHTML = '';
  if (state.currentTab === 'home') renderHome(cnt);
  else if (state.currentTab === 'ai') renderAI(cnt);
  else if (state.currentTab === 'list') renderList(cnt);
  else if (state.currentTab === 'tools') renderTools(cnt);
}

function renderAI(cnt) {
  let chatHtml = `<div class="chat-container">
    <div class="chat-msgs" id="chatMsgs">`;
  
  state.chatHistory.forEach(msg => {
    const roleClass = msg.role === 'assistant' ? 'ai' : 'user';
    chatHtml += `<div class="msg ${roleClass}">${msg.content}</div>`;
  });

  if(state.isTyping) chatHtml += `<div class="loading">جاري تحليل النص قانونياً...</div>`;

  chatHtml += `</div>
    <div class="chat-input-area">
      <input type="text" id="aiInput" class="chat-input" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') askAI()">
      <button class="send-btn" onclick="askAI()">◀</button>
    </div>
  </div>`;
  
  cnt.innerHTML = chatHtml;
  const objDiv = document.getElementById("chatMsgs");
  if(objDiv) objDiv.scrollTop = objDiv.scrollHeight;
}

async function askAI() {
  const inp = document.getElementById('aiInput');
  const txt = inp.value.trim();
  if(!txt || state.isTyping) return;

  state.chatHistory.push({role: 'user', content: txt});
  state.isTyping = true;
  inp.value = '';
  renderAI(document.getElementById('cnt'));

  try {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: "gpt-4o",
        messages: [
          {role: "system", content: "أنت مساعد قانوني خبير في الأنظمة السعودية (نظام العمل، المرافعات، الإجراءات الجزائية، وغيرها). تخاطب المستخدم 'أستاذ سعود' بلهجة مهنية محترمة وقصيرة ومباشرة."},
          ...state.chatHistory
        ]
      })
    });

    const data = await response.json();
    const aiMsg = data.choices[0].message.content;
    state.chatHistory.push({role: 'assistant', content: aiMsg});
  } catch (err) {
    state.chatHistory.push({role: 'assistant', content: 'عذراً أستاذ سعود، حدث خطأ في الاتصال. تأكد من رصيد الـ API أو اتصال الإنترنت.'});
  } finally {
    state.isTyping = false;
    renderAI(document.getElementById('cnt'));
  }
}

function renderHome(cnt) {
  cnt.innerHTML = `<h3>مرحباً بك أستاذ سعود ⚖️</h3><br>
  <div class="card" onclick="go('ai')">
    <div class="cn">المستشار الذكي (نشط الآن)</div>
    <p style="font-size:12px; color:var(--text3)">اضغط لبدء استشارة فورية باستخدام GPT-4o</p>
  </div>`;
}

function renderList(cnt) {
  cnt.innerHTML = `<h3>الجلسات</h3><br>` + (state.sessions.length ? state.sessions.map(s=>`<div class="card"><div class="cn">${s.num}</div></div>`).join('') : '<p>لا يوجد جلسات</p>');
}

function renderTools(cnt) {
  cnt.innerHTML = `<h3>الأدوات</h3><br><div class="tool-btn" onclick="window.open('https://najiz.sa')">ناجز</div>`;
}

window.onload = render;
</script>
</body>
</html>
