<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>مكتب المحامي سعود | النظام المتكامل</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0a0e17; --ink2:#111827; --ink3:#1a2233;
  --card:#1c2540; --card2:#222d48;
  --rim:rgba(255,255,255,0.07); --rim2:rgba(255,255,255,0.12);
  --gold:#c9a84c; --gold2:#e8c870;
  --gold-dim:rgba(201,168,76,0.15); --gold-rim:rgba(201,168,76,0.3);
  --text:#eef2ff; --text2:#94a3c0; --text3:#5a6a88;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,20px);
}
body.day {
  --ink:#f0f4ff; --ink2:#e2e8f8; --ink3:#d8dfee;
  --card:#ffffff; --card2:#f5f8ff;
  --rim:rgba(0,0,0,0.07); --rim2:rgba(0,0,0,0.12);
  --text:#0a0e17; --text2:#334155; --text3:#64748b;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--ink); overflow:hidden; font-family:'IBM Plex Sans Arabic',sans-serif; color:var(--text); direction:rtl; transition:all .3s; }

#app { display:flex; flex-direction:column; height:100vh; height:100dvh; max-width:430px; margin:0 auto; background:var(--ink); }
#hdr { flex-shrink:0; padding-top:var(--safe-top); background:var(--ink); z-index:40; }
.hi { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; }
.ht { font-family:'Amiri',serif; font-size:21px; font-weight:700; color:var(--gold2); }
.ha { display:flex; gap:6px; }
.bi { width:34px; height:34px; border-radius:10px; background:var(--card); border:1px solid var(--rim2); color:var(--text2); display:flex; align-items:center; justify-content:center; cursor:pointer; }
.bn { background:var(--gold); color:var(--ink); border-radius:12px; padding:8px 14px; font-size:12px; font-weight:700; cursor:pointer; box-shadow:0 4px 12px rgba(201,168,76,.3); }

.ts { display:flex; padding:8px; gap:4px; overflow-x:auto; background:var(--ink); }
.tp { flex-shrink:0; padding:8px 14px; border-radius:10px; color:var(--text3); font-size:11px; font-weight:600; cursor:pointer; border:1px solid transparent; white-space:nowrap; }
.tp.on { background:var(--gold-dim); color:var(--gold2); border-color:var(--gold-rim); }

#cnt { flex:1; overflow-y:auto; padding:15px; }

/* Cards & Items */
.card { background:var(--card); border:1px solid var(--rim); border-radius:16px; padding:15px; margin-bottom:12px; position:relative; }
.ct { display:flex; justify-content:space-between; align-items:flex-start; }
.cn { font-family:'Amiri',serif; font-size:17px; font-weight:700; color:var(--gold2); }
.badge { display:inline-block; padding:3px 8px; border-radius:8px; font-size:10px; font-weight:700; margin-top:8px; }

.task-item { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--rim); border-radius:12px; padding:12px; margin-bottom:8px; transition:opacity .2s; }
.task-item.done { opacity:0.5; }
.task-item.done span { text-decoration:line-through; }
.check { width:20px; height:20px; border-radius:6px; border:2px solid var(--gold2); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.task-item.done .check { background:var(--gold2); }

.list-item { background:var(--card); border:1px solid var(--rim); border-radius:12px; padding:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }

.field { margin-bottom:12px; }
.field label { display:block; font-size:11px; color:var(--text3); margin-bottom:5px; }
.field input, .field select { width:100%; background:var(--ink3); border:1px solid var(--rim2); border-radius:10px; padding:10px; color:var(--text); font-family:inherit; }

.ov { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; justify-content:flex-end; }
.ov.hid { display:none; }
.ob { position:absolute; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); }
.sheet { position:relative; background:var(--card); border-radius:20px 20px 0 0; padding:20px; max-height:80vh; overflow-y:auto; }

.sg { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px; }
.sc { background:var(--card2); border:1px solid var(--gold-rim); border-radius:14px; padding:15px; text-align:center; }
.sn { font-size:24px; font-weight:bold; color:var(--gold2); }
.sl { font-size:10px; color:var(--text3); margin-top:4px; }

.toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:var(--gold); color:var(--ink); padding:8px 16px; border-radius:20px; font-size:12px; font-weight:bold; z-index:1000; display:none; }
</style>
</head>
<body class="">

<div id="app">
  <div id="hdr">
    <div class="hi">
      <div class="ht">المكتب الرقمي ⚖️</div>
      <div class="ha">
        <button class="bi" onclick="toggleTheme()">🌓</button>
        <button class="bn" onclick="openForm()">+ إضافة</button>
      </div>
    </div>
    <div class="ts">
      <button class="tp on" id="t-home" onclick="go('home')">الرئيسية</button>
      <button class="tp" id="t-tasks" onclick="go('tasks')">المهمات</button>
      <button class="tp" id="t-people" onclick="go('people')">الأطراف</button>
      <button class="tp" id="t-files" onclick="go('files')">الملفات</button>
      <button class="tp" id="t-stats" onclick="go('stats')">التقارير</button>
    </div>
  </div>

  <div id="cnt"></div>
</div>

<div class="toast" id="toast"></div>

<div class="ov hid" id="pop">
  <div class="ob" onclick="closeForm()"></div>
  <div class="sheet" id="sheetCnt"></div>
</div>

<script>
// --- Data Stores ---
let sessions = JSON.parse(localStorage.getItem('saud_sessions') || '[]');
let tasks = JSON.parse(localStorage.getItem('saud_tasks') || '[]');
let people = JSON.parse(localStorage.getItem('saud_people') || '[]');
let curTab = 'home';

// --- Core Logic ---
function go(tab) {
  curTab = tab;
  document.querySelectorAll('.tp').forEach(t => t.classList.toggle('on', t.id === 't-'+tab));
  render();
}

function render() {
  const cnt = document.getElementById('cnt');
  if (curTab === 'home') renderHome(cnt);
  if (curTab === 'tasks') renderTasks(cnt);
  if (curTab === 'people') renderPeople(cnt);
  if (curTab === 'files') renderFiles(cnt);
  if (curTab === 'stats') renderStats(cnt);
}

// --- Home (Sessions) ---
function renderHome(cnt) {
  let h = '<div style="font-size:12px; color:var(--text3); margin-bottom:10px">الجلسات المجدولة</div>';
  if(sessions.length === 0) h += '<div style="text-align:center; padding:40px; color:var(--text3)">لا يوجد جلسات مضافة</div>';
  sessions.forEach((s, i) => {
    h += `<div class="card">
      <div class="ct">
        <div class="cn">${s.num} <br><small style="font-size:10px; color:var(--text3)">🏛️ ${s.court}</small></div>
        <div style="text-align:left"><div style="font-size:14px; font-weight:bold">${s.time}</div><div style="font-size:10px; color:var(--text3)">${s.date}</div></div>
      </div>
      <div class="badge" style="background:var(--gold-dim); color:var(--gold2)">${s.status === 'done' ? '✅ منتهية' : '⏳ قيد الانتظار'}</div>
      <button onclick="delSession(${i})" style="position:absolute; bottom:15px; left:15px; background:none; color:var(--text3); font-size:10px">حذف</button>
    </div>`;
  });
  cnt.innerHTML = h;
}

// --- Tasks ---
function renderTasks(cnt) {
  let h = `
    <div style="display:flex; gap:8px; margin-bottom:15px">
      <input type="text" id="taskInp" placeholder="مهمة جديدة..." style="flex:1; background:var(--card); border:1px solid var(--rim2); border-radius:10px; padding:10px; color:var(--text)">
      <button class="bn" onclick="addTask()">إضافة</button>
    </div>
  `;
  tasks.forEach((t, i) => {
    h += `
      <div class="task-item ${t.done ? 'done' : ''}">
        <div class="check" onclick="toggleTask(${i})">${t.done ? '✓' : ''}</div>
        <span style="flex:1; font-size:13px">${t.title}</span>
        <button onclick="delTask(${i})" style="color:var(--text3); background:none">✕</button>
      </div>
    `;
  });
  cnt.innerHTML = h || '<div style="text-align:center; padding:40px">لا توجد مهام حالية</div>';
}

// --- People (Contacts) ---
function renderPeople(cnt) {
  let h = '<div style="font-size:12px; color:var(--text3); margin-bottom:10px">دليل الأطراف والموكلين</div>';
  people.forEach((p, i) => {
    h += `<div class="list-item">
      <div>
        <div style="font-size:14px; font-weight:bold">${p.name}</div>
        <div style="font-size:10px; color:var(--gold2)">${p.role}</div>
      </div>
      <button class="bi" onclick="delPerson(${i})">🗑️</button>
    </div>`;
  });
  cnt.innerHTML = h + `<button class="bn" style="width:100%; margin-top:10px" onclick="openPersonForm()">+ إضافة طرف جديد</button>`;
}

// --- Stats ---
function renderStats(cnt) {
  const completed = sessions.filter(s => s.status === 'done').length;
  const pending = sessions.length - completed;
  cnt.innerHTML = `
    <div style="font-size:12px; color:var(--text3); margin-bottom:15px">تحليل الأداء الرقمي</div>
    <div class="sg">
      <div class="sc"><div class="sn">${sessions.length}</div><div class="sl">إجمالي القضايا</div></div>
      <div class="sc"><div class="sn">${completed}</div><div class="sl">جلسات مكتملة</div></div>
      <div class="sc"><div class="sn">${pending}</div><div class="sl">جلسات قادمة</div></div>
      <div class="sc"><div class="sn">${tasks.filter(t => t.done).length}</div><div class="sl">مهام منجزة</div></div>
    </div>
    <div style="background:var(--card); padding:15px; border-radius:15px; font-size:12px; color:var(--text2); line-height:1.6">
      أستاذ سعود، نسبة الإنجاز الحالية في المكتب هي <b>${sessions.length ? Math.round((completed/sessions.length)*100) : 0}%</b>. 
      لديك ${tasks.filter(t => !t.done).length} مهمة مكتبية معلقة تحتاج لمتابعة.
    </div>
  `;
}

// --- Files ---
function renderFiles(cnt) {
  cnt.innerHTML = `
    <div style="text-align:center; padding:40px">
      <div style="font-size:40px; margin-bottom:10px">📁</div>
      <div style="font-size:14px; font-weight:bold">أرشيف مذكرات الدفاع</div>
      <div style="font-size:11px; color:var(--text3); margin-top:5px">سيتم ربط هذا القسم بالسحابة قريباً</div>
      <button class="bn" style="margin-top:20px" disabled>رفع مذكرة (قريباً)</button>
    </div>
  `;
}

// --- Form Handling ---
function openForm() {
  const sheet = document.getElementById('sheetCnt');
  sheet.innerHTML = `
    <div style="font-family:'Amiri',serif; font-size:20px; font-weight:bold; color:var(--gold2); margin-bottom:15px">إضافة جلسة جديدة</div>
    <div class="field"><label>رقم القضية</label><input type="text" id="sNum" placeholder="مثال: 45000123"></div>
    <div class="field"><label>المحكمة</label><input type="text" id="sCourt" placeholder="المحكمة العامة بالرياض"></div>
    <div class="sg">
      <div class="field"><label>التاريخ</label><input type="date" id="sDate"></div>
      <div class="field"><label>الوقت</label><input type="time" id="sTime"></div>
    </div>
    <button class="bn" style="width:100%; padding:12px" onclick="saveSession()">حفظ الجلسة</button>
  `;
  document.getElementById('pop').classList.remove('hid');
}

function openPersonForm() {
  const sheet = document.getElementById('sheetCnt');
  sheet.innerHTML = `
    <div style="font-family:'Amiri',serif; font-size:20px; font-weight:bold; color:var(--gold2); margin-bottom:15px">إضافة طرف</div>
    <div class="field"><label>الاسم الكامل</label><input type="text" id="pName"></div>
    <div class="field"><label>الصفة</label>
      <select id="pRole">
        <option>موكل</option>
        <option>خصم</option>
        <option>شاهد</option>
        <option>خبير</option>
      </select>
    </div>
    <button class="bn" style="width:100%; padding:12px" onclick="savePerson()">حفظ البيانات</button>
  `;
  document.getElementById('pop').classList.remove('hid');
}

// --- Data Actions ---
function saveSession() {
  const s = {
    num: document.getElementById('sNum').value,
    court: document.getElementById('sCourt').value,
    date: document.getElementById('sDate').value,
    time: document.getElementById('sTime').value,
    status: 'pending'
  };
  sessions.push(s);
  localStorage.setItem('saud_sessions', JSON.stringify(sessions));
  closeForm(); showToast('✅ تم حفظ الجلسة'); go('home');
}

function savePerson() {
  const p = { name: document.getElementById('pName').value, role: document.getElementById('pRole').value };
  people.push(p);
  localStorage.setItem('saud_people', JSON.stringify(people));
  closeForm(); showToast('👤 تمت إضافة الطرف'); go('people');
}

function addTask() {
  const inp = document.getElementById('taskInp');
  if(!inp.value) return;
  tasks.push({ title: inp.value, done: false });
  localStorage.setItem('saud_tasks', JSON.stringify(tasks));
  render(); inp.value = '';
}

function toggleTask(i) { tasks[i].done = !tasks[i].done; localStorage.setItem('saud_tasks', JSON.stringify(tasks)); render(); }
function delTask(i) { tasks.splice(i,1); localStorage.setItem('saud_tasks', JSON.stringify(tasks)); render(); }
function delSession(i) { sessions.splice(i,1); localStorage.setItem('saud_sessions', JSON.stringify(sessions)); render(); }
function delPerson(i) { people.splice(i,1); localStorage.setItem('saud_people', JSON.stringify(people)); render(); }

function closeForm() { document.getElementById('pop').classList.add('hid'); }
function toggleTheme() { document.body.classList.toggle('day'); }
function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

// --- Init ---
window.onload = () => {
  render();
};
</script>
</body>
</html>
